name: CI

on:
  pull_request:
  push:
    branches:
      - alpha
      - beta
      - master

jobs:
  package:
    name: Package / Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22.22.1
          - 24
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install root deps
        run: npm ci
      - name: Install package deps
        working-directory: packages/vue-quill
        run: npm ci
      - name: Lint package sources
        run: npm run lint
      - name: Build package
        run: npm run build -- vue-quill --assets --types
      - name: Verify package artifacts
        run: npx ts-node scripts/verifyRelease.ts vue-quill

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - name: Install docs deps
        working-directory: docs
        run: npm ci
      - name: Build docs
        working-directory: docs
        run: npm run build

  demo:
    name: Demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            demo/package-lock.json
            packages/vue-quill/package-lock.json
      - name: Install root deps
        run: npm ci
      - name: Install package deps
        working-directory: packages/vue-quill
        run: npm ci
      - name: Install demo deps
        working-directory: demo
        run: npm ci
      - name: Build package assets for demo
        run: npm run build -- vue-quill --assets --types
      - name: Build demo
        working-directory: demo
        run: npm run build

  examples:
    name: Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: examples/vite-app/package-lock.json
      - name: Install example deps
        working-directory: examples/vite-app
        run: npm ci
      - name: Build Vite example
        working-directory: examples/vite-app
        run: npm run build
